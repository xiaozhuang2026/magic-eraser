<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI魔法橡皮擦 - 免费在线去水印</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f0f1a;--card:#1a1a2e;--accent:#7c3aed;--accent2:#3b82f6;--text:#e2e8f0;--border:#2d2d44;--hover:#252542}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.header{text-align:center;padding:30px 20px 10px;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);border-bottom:1px solid var(--border)}
.header h1{font-size:28px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
.header p{color:#94a3b8;font-size:14px}
.app{max-width:1200px;margin:0 auto;padding:20px}
.toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;padding:12px 16px;background:var(--card);border-radius:12px;margin-bottom:16px;border:1px solid var(--border)}
.toolbar .sep{width:1px;height:28px;background:var(--border)}
.btn{padding:8px 18px;border-radius:8px;border:none;cursor:pointer;font-size:14px;font-weight:500;transition:all .2s;display:flex;align-items:center;gap:6px}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.btn-primary:hover{opacity:.85;transform:translateY(-1px)}
.btn-secondary{background:var(--hover);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{background:#2f2f50}
.btn-danger{background:#dc2626;color:#fff}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn.active{box-shadow:0 0 0 2px var(--accent)}
.brush-control{display:flex;align-items:center;gap:8px;font-size:13px;color:#94a3b8}
.brush-control input[type=range]{width:100px;accent-color:var(--accent)}
.brush-control span{min-width:30px}
.upload-area{border:2px dashed var(--border);border-radius:16px;padding:60px 20px;text-align:center;cursor:pointer;transition:all .3s;background:var(--card)}
.upload-area:hover,.upload-area.dragover{border-color:var(--accent);background:#1e1e38}
.upload-area svg{width:64px;height:64px;margin-bottom:16px;opacity:.5}
.upload-area h2{font-size:20px;margin-bottom:8px}
.upload-area p{color:#94a3b8;font-size:14px}
.canvas-container{position:relative;display:none;background:var(--card);border-radius:12px;overflow:hidden;border:1px solid var(--border)}
.canvas-container.active{display:block}
.canvas-wrapper{position:relative;overflow:auto;max-height:65vh;display:flex;justify-content:center;align-items:center;background:#0a0a15}
#mainCanvas{cursor:crosshair;display:block;max-width:100%}
.comparison-container{position:relative;display:none;overflow:hidden;border-radius:12px;border:1px solid var(--border)}
.comparison-container.active{display:block}
.comparison-container canvas{display:block}
.slider-line{position:absolute;top:0;bottom:0;width:3px;background:#fff;cursor:ew-resize;z-index:10}
.slider-handle{position:absolute;top:50%;transform:translate(-50%,-50%);width:36px;height:36px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.4);z-index:11;cursor:ew-resize}
.slider-handle::after{content:'⟷';font-size:16px;color:#333}
.progress-overlay{display:none;position:absolute;inset:0;background:rgba(15,15,26,.85);z-index:20;flex-direction:column;align-items:center;justify-content:center;border-radius:12px}
.progress-overlay.active{display:flex}
.spinner{width:48px;height:48px;border:4px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;margin-bottom:16px}
@keyframes spin{to{transform:rotate(360deg)}}
.progress-text{font-size:15px;color:#94a3b8}
.status-bar{text-align:center;padding:8px;font-size:12px;color:#64748b}
.features{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-top:24px}
.feature{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;text-align:center}
.feature .icon{font-size:32px;margin-bottom:10px}
.feature h3{font-size:15px;margin-bottom:6px}
.feature p{font-size:12px;color:#94a3b8}
.toast{position:fixed;top:20px;right:20px;padding:12px 24px;border-radius:8px;background:#22c55e;color:#fff;font-size:14px;z-index:100;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
.hidden{display:none!important}
</style>
</head>
<body>
<div class="header">

</div>
<div class="app">

<div class="upload-area" id="uploadArea">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/></svg>
<h2>拖拽图片到这里，或点击上传</h2>

<div id="editorSection" class="hidden">

画笔大小: <input type="range" id="brushSize" min="3" max="80" value="20"> <span id="brushSizeVal">20</span>px
</div>

<!-- Canvas -->

<!-- Comparison -->
<div class="comparison-container" id="comparisonBox">
<canvas id="compCanvas"></canvas>

<div class="slider-handle" id="sliderHandle"></div>
</div>

</div>

<div class="features" id="featureSection">
<div class="feature"><div class="icon">🔒</div><h3>隐私安全</h3><p>图片完全在浏览器本地处理，不上传任何服务器</p></div>
<div class="feature"><div class="icon">🆓</div><h3>完全免费</h3><p>无限制使用，无水印，无收费</p></div>
<div class="feature"><div class="icon">⚡</div><h3>智能修复</h3><p>多方向像素插值 + 纹理合成，自动填充背景</p></div>
<div class="feature"><div class="icon">📱</div><h3>多端支持</h3><p>手机、平板、电脑均可使用</p></div>
</div>
</div>

<div class="toast" id="toast"></div>

<script>
const $=id=>document.getElementById(id);
const uploadArea=$('uploadArea'),fileInput=$('fileInput');
const editorSection=$('editorSection'),featureSection=$('featureSection');
const mainCanvas=$('mainCanvas'),ctx=mainCanvas.getContext('2d');
const compCanvas=$('compCanvas'),compCtx=compCanvas.getContext('2d');
const canvasBox=$('canvasBox'),comparisonBox=$('comparisonBox');
const brushSizeInput=$('brushSize'),brushSizeVal=$('brushSizeVal');
const btnRemove=$('btnRemove'),btnUndo=$('btnUndo'),btnRedo=$('btnRedo');
const btnCompare=$('btnCompare'),btnDownload=$('btnDownload');
const btnBrush=$('btnBrush'),btnEraser=$('btnEraser');
const progressOverlay=$('progressOverlay'),progressText=$('progressText');
const statusBar=$('statusBar');
const sliderLine=$('sliderLine'),sliderHandle=$('sliderHandle');

let originalImg=null,resultImg=null;
let maskCanvas,maskCtx;
let painting=false,tool='brush';
let undoStack=[],redoStack=[];
let isComparing=false,compSliderX=0.5;
let displayScale=1;

// Upload
uploadArea.addEventListener('click',()=>fileInput.click());
fileInput.addEventListener('change',e=>{if(e.target.files[0])loadImage(e.target.files[0])});
uploadArea.addEventListener('dragover',e=>{e.preventDefault();uploadArea.classList.add('dragover')});
uploadArea.addEventListener('dragleave',()=>uploadArea.classList.remove('dragover'));
uploadArea.addEventListener('drop',e=>{e.preventDefault();uploadArea.classList.remove('dragover');if(e.dataTransfer.files[0])loadImage(e.dataTransfer.files[0])});
$('btnUploadNew').addEventListener('click',()=>{fileInput.value='';fileInput.click()});

function loadImage(file){
const reader=new FileReader();
reader.onload=e=>{
const img=new Image();
img.onload=()=>{
originalImg=img;
resultImg=null;
setupCanvas(img);
editorSection.classList.remove('hidden');
uploadArea.style.display='none';
featureSection.style.display='none';
btnRemove.disabled=true;btnCompare.disabled=true;btnDownload.disabled=true;
undoStack=[];redoStack=[];btnUndo.disabled=true;btnRedo.disabled=true;
isComparing=false;canvasBox.classList.add('active');comparisonBox.classList.remove('active');
statusBar.textContent='涂抹要去除的水印区域，然后点击「去除水印」';
};
img.src=e.target.result;
};
reader.readAsDataURL(file);
}

function setupCanvas(img){
const maxW=1100,maxH=650;
let w=img.width,h=img.height;
displayScale=Math.min(maxW/w,maxH/h,1);
const dw=Math.round(w*displayScale),dh=Math.round(h*displayScale);
mainCanvas.width=dw;mainCanvas.height=dh;
ctx.drawImage(img,0,0,dw,dh);
maskCanvas=document.createElement('canvas');
maskCanvas.width=dw;maskCanvas.height=dh;
maskCtx=maskCanvas.getContext('2d');
maskCtx.clearRect(0,0,dw,dh);
}

// Brush painting
function getPos(e){
const rect=mainCanvas.getBoundingClientRect();
const t=e.touches?e.touches[0]:e;
return{x:(t.clientX-rect.left)*(mainCanvas.width/rect.width),y:(t.clientY-rect.top)*(mainCanvas.height/rect.height)};
}

function startPaint(e){
e.preventDefault();painting=true;
const p=getPos(e);
maskCtx.beginPath();maskCtx.moveTo(p.x,p.y);
paintDot(p);
}
function movePaint(e){
e.preventDefault();if(!painting)return;
const p=getPos(e);
paintDot(p);
}
function endPaint(e){
if(!painting)return;painting=false;
saveUndo();
btnRemove.disabled=false;
}
function paintDot(p){
const r=parseInt(brushSizeInput.value)/2;
maskCtx.globalCompositeOperation=tool==='brush'?'source-over':'destination-out';
maskCtx.fillStyle='rgba(255,0,0,0.5)';
maskCtx.beginPath();maskCtx.arc(p.x,p.y,r,0,Math.PI*2);maskCtx.fill();
redraw();
}
function redraw(){
ctx.drawImage(originalImg,0,0,mainCanvas.width,mainCanvas.height);
if(hasMask()){
const tmp=document.createElement('canvas');
tmp.width=mainCanvas.width;tmp.height=mainCanvas.height;
const tc=tmp.getContext('2d');
tc.drawImage(maskCanvas,0,0);
tc.globalCompositeOperation='source-in';
tc.fillStyle='rgba(255,60,60,0.35)';
tc.fillRect(0,0,tmp.width,tmp.height);
ctx.drawImage(tmp,0,0);
}
}
function hasMask(){const d=maskCtx.getImageData(0,0,maskCanvas.width,maskCanvas.height).data;for(let i=3;i<d.length;i+=4)if(d[i]>0)return true;return false}

mainCanvas.addEventListener('mousedown',startPaint);
mainCanvas.addEventListener('mousemove',movePaint);
mainCanvas.addEventListener('mouseup',endPaint);
mainCanvas.addEventListener('mouseleave',endPaint);
mainCanvas.addEventListener('touchstart',startPaint,{passive:false});
mainCanvas.addEventListener('touchmove',movePaint,{passive:false});
mainCanvas.addEventListener('touchend',endPaint);

// Tools
btnBrush.addEventListener('click',()=>{tool='brush';btnBrush.classList.add('active');btnEraser.classList.remove('active')});
btnEraser.addEventListener('click',()=>{tool='eraser';btnEraser.classList.add('active');btnBrush.classList.remove('active')});
brushSizeInput.addEventListener('input',()=>brushSizeVal.textContent=brushSizeInput.value);

// Undo/Redo
function saveUndo(){
const imgData=maskCtx.getImageData(0,0,maskCanvas.width,maskCanvas.height);
undoStack.push(imgData);if(undoStack.length>30)undoStack.shift();
redoStack=[];btnUndo.disabled=false;btnRedo.disabled=true;
}
btnUndo.addEventListener('click',()=>{
if(undoStack.length===0)return;
const cur=maskCtx.getImageData(0,0,maskCanvas.width,maskCanvas.height);
redoStack.push(cur);
maskCtx.putImageData(undoStack.pop(),0,0);
redraw();btnUndo.disabled=undoStack.length===0;btnRedo.disabled=false;
btnRemove.disabled=!hasMask();
});
btnRedo.addEventListener('click',()=>{
if(redoStack.length===0)return;
const cur=maskCtx.getImageData(0,0,maskCanvas.width,maskCanvas.height);
undoStack.push(cur);
maskCtx.putImageData(redoStack.pop(),0,0);
redraw();btnRedo.disabled=redoStack.length===0;btnUndo.disabled=false;
btnRemove.disabled=!hasMask();
});

// Inpainting
btnRemove.addEventListener('click',async()=>{
progressOverlay.classList.add('active');
progressText.textContent='正在智能修复中...';
await new Promise(r=>setTimeout(r,50));
try{
await inpaint();
resultImg=mainCanvas.toDataURL('image/png');
btnCompare.disabled=false;btnDownload.disabled=false;
statusBar.textContent='✅ 修复完成！点击「对比」查看效果，或「下载」保存结果';
showToast('修复完成！');
}catch(e){
showToast('修复失败: '+e.message);
}
progressOverlay.classList.remove('active');
});

async function inpaint(){
const w=mainCanvas.width,h=mainCanvas.height;
const srcData=ctx.getImageData(0,0,w,h);
const maskData=maskCtx.getImageData(0,0,w,h);
const src=srcData.data,mask=maskData.data;

// Build mask
const isMask=new Uint8Array(w*h);
let maskCount=0;
for(let i=0;i<w*h;i++){if(mask[i*4+3]>30){isMask[i]=1;maskCount++}}
if(maskCount===0)return;

const result=new Float32Array(src.length);
for(let i=0;i<src.length;i++)result[i]=src[i];

// ===== PHASE 1: 12-directional ray sampling =====
// Cast rays to find nearest real background pixels
// Weighted interpolation preserves large-scale gradients
progressText.textContent='采样背景...';
await new Promise(r=>setTimeout(r,0));

const DIRS=12;
const dxC=[],dyC=[];
for(let d=0;d<DIRS;d++){const a=d*Math.PI*2/DIRS;dxC.push(Math.cos(a));dyC.push(Math.sin(a))}
const MAX_RAY=Math.min(300,Math.max(w,h));
let proc=0;

for(let y=0;y<h;y++){
for(let x=0;x<w;x++){
const idx=y*w+x;if(!isMask[idx])continue;
let sR=0,sG=0,sB=0,sW=0;
for(let d=0;d<DIRS;d++){
for(let s=1;s<MAX_RAY;s++){
const rx=Math.round(x+dxC[d]*s),ry=Math.round(y+dyC[d]*s);
if(rx<0||rx>=w||ry<0||ry>=h)break;
if(!isMask[ry*w+rx]){
const pi=(ry*w+rx)*4;const wt=1/(s*s);
sR+=src[pi]*wt;sG+=src[pi+1]*wt;sB+=src[pi+2]*wt;sW+=wt;break;
}
}
}
if(sW>0){result[idx*4]=sR/sW;result[idx*4+1]=sG/sW;result[idx*4+2]=sB/sW}
proc++;
}
if(proc%10000===0){progressText.textContent='采样背景... '+Math.min(99,Math.round(proc/maskCount*100))+'%';await new Promise(r=>setTimeout(r,0))}
}

// ===== PHASE 2: PatchMatch - find best matching real texture =====
// KEY: compare only non-mask boundary pixels for accurate matching
// Source uses ORIGINAL image data (real texture, not interpolated)
progressText.textContent='纹理搜索...';
await new Promise(r=>setTimeout(r,0));

const PR=4; // 9x9 patch
const ITERS=12;
const nnfx=new Int32Array(w*h);
const nnfy=new Int32Array(w*h);

// Smart init: prefer nearby non-mask pixels
for(let y=0;y<h;y++){
for(let x=0;x<w;x++){
const idx=y*w+x;
if(!isMask[idx]){nnfx[idx]=0;nnfy[idx]=0;continue}
let found=false;
for(let r=1;r<80&&!found;r++){
for(let dy=-r;dy<=r&&!found;dy++){
for(let dx=-r;dx<=r&&!found;dx++){
if(Math.abs(dx)!==r&&Math.abs(dy)!==r)continue;
const nx=x+dx,ny=y+dy;
if(nx>=PR&&nx<w-PR&&ny>=PR&&ny<h-PR&&!isMask[ny*w+nx]){
nnfx[idx]=dx;nnfy[idx]=dy;found=true;
}
}
}
}
if(!found){nnfx[idx]=0;nnfy[idx]=0}
}
}

// Patch distance: only compare non-mask pixels in target patch
// This ensures we match against REAL boundary pixels, not interpolated ones
function pdist(tx,ty,sx,sy){
let d=0,cnt=0;
for(let j=-PR;j<=PR;j++){
for(let i=-PR;i<=PR;i++){
const ax=tx+i,ay=ty+j,bx=sx+i,by=sy+j;
if(ax<0||ax>=w||ay<0||ay>=h||bx<0||bx>=w||by<0||by>=h)continue;
if(isMask[ay*w+ax])continue; // Skip mask pixels - only compare real boundary
const p1=(ay*w+ax)*4,p2=(by*w+bx)*4;
const dr=result[p1]-src[p2],dg=result[p1+1]-src[p2+1],db=result[p1+2]-src[p2+2];
d+=dr*dr+dg*dg+db*db;cnt++;
}
}
const offD=(sx-tx)*(sx-tx)+(sy-ty)*(sy-ty);
return(cnt>0?d/cnt:1e9)+offD*0.08;
}

for(let iter=0;iter<ITERS;iter++){
const fwd=iter%2===0;
for(let y=fwd?0:h-1;fwd?y<h:y>=0;y+=fwd?1:-1){
for(let x=fwd?0:w-1;fwd?x<w:x>=0;x+=fwd?1:-1){
const idx=y*w+x;
if(!isMask[idx])continue;

let bx=Math.max(PR,Math.min(w-PR-1,x+nnfx[idx]));
let by=Math.max(PR,Math.min(h-PR-1,y+nnfy[idx]));
if(isMask[by*w+bx]){bx=PR;by=PR}
let bd=pdist(x,y,bx,by);

// Propagation: horizontal neighbor
const hx=fwd?x-1:x+1;
if(hx>=0&&hx<w&&isMask[y*w+hx]){
const sx=hx+nnfx[y*w+hx],sy=y+nnfy[y*w+hx];
if(sx>=PR&&sx<w-PR&&sy>=PR&&sy<h-PR&&!isMask[sy*w+sx]){
const d=pdist(x,y,sx,sy);if(d<bd){bx=sx;by=sy;bd=d}
}
}

// Propagation: vertical neighbor
const vy=fwd?y-1:y+1;
if(vy>=0&&vy<h&&isMask[vy*w+x]){
const sx=x+nnfx[vy*w+x],sy=vy+nnfy[vy*w+x];
if(sx>=PR&&sx<w-PR&&sy>=PR&&sy<h-PR&&!isMask[sy*w+sx]){
const d=pdist(x,y,sx,sy);if(d<bd){bx=sx;by=sy;bd=d}
}
}

// Random search with decreasing radius
let sRad=Math.max(w,h)/2;
while(sRad>=2){
const rx=Math.round(bx+(Math.random()*2-1)*sRad);
const ry=Math.round(by+(Math.random()*2-1)*sRad);
if(rx>=PR&&rx<w-PR&&ry>=PR&&ry<h-PR&&!isMask[ry*w+rx]){
const d=pdist(x,y,rx,ry);if(d<bd){bx=rx;by=ry;bd=d}
}
sRad=Math.floor(sRad*0.5);
}
nnfx[idx]=bx-x;nnfy[idx]=by-y;
}
}
progressText.textContent='纹理搜索... 第'+(iter+1)+'/'+ITERS+'轮';
await new Promise(r=>setTimeout(r,0));
}

// ===== PHASE 3: DIRECT COPY - no averaging! =====
// Copy REAL pixel values from source. This is why it won't be blurry.
progressText.textContent='复制纹理...';
await new Promise(r=>setTimeout(r,0));

for(let y=0;y<h;y++){
for(let x=0;x<w;x++){
const idx=y*w+x;if(!isMask[idx])continue;
const sx=x+nnfx[idx],sy=y+nnfy[idx];
if(sx>=0&&sx<w&&sy>=0&&sy<h&&!isMask[sy*w+sx]){
const si=(sy*w+sx)*4,ti=idx*4;
result[ti]=src[si];result[ti+1]=src[si+1];result[ti+2]=src[si+2];
}
}
}

// ===== PHASE 4: Local Poisson blending (boundary band only) =====
// Smooth only at mask boundary to eliminate seams
// Interior pixels keep their direct-copied real texture
progressText.textContent='无缝融合...';
await new Promise(r=>setTimeout(r,0));

const BAND=6;
const isBand=new Uint8Array(w*h);
for(let y=0;y<h;y++){
for(let x=0;x<w;x++){
const idx=y*w+x;if(!isMask[idx])continue;
for(let dy=-BAND;dy<=BAND;dy++){
for(let dx=-BAND;dx<=BAND;dx++){
const nx=x+dx,ny=y+dy;
if(nx>=0&&nx<w&&ny>=0&&ny<h&&!isMask[ny*w+nx]){isBand[idx]=1;break}
}
if(isBand[idx])break;
}
}
}

for(let iter=0;iter<50;iter++){
const prev=new Float32Array(result.length);
for(let i=0;i<result.length;i++)prev[i]=result[i];
for(let y=1;y<h-1;y++){
for(let x=1;x<w-1;x++){
const idx=y*w+x;if(!isBand[idx])continue;
const pi=idx*4;
for(let c=0;c<3;c++){
result[pi+c]=(prev[((y-1)*w+x)*4+c]+prev[((y+1)*w+x)*4+c]+prev[(y*w+(x-1))*4+c]+prev[(y*w+(x+1))*4+c])/4;
}
}
}
if(iter%10===0)await new Promise(r=>setTimeout(r,0));
}

// ===== PHASE 5: Color correction =====
progressText.textContent='颜色校正...';
await new Promise(r=>setTimeout(r,0));

let inR=0,inG=0,inB=0,inN=0;
let outR=0,outG=0,outB=0,outN=0;
for(let y=0;y<h;y++){
for(let x=0;x<w;x++){
const idx=y*w+x;
if(isBand[idx]){inR+=result[idx*4];inG+=result[idx*4+1];inB+=result[idx*4+2];inN++}
else if(!isMask[idx]){
let border=false;
for(let dy=-1;dy<=1&&!border;dy++)for(let dx=-1;dx<=1&&!border;dx++){
const nx=x+dx,ny=y+dy;
if(nx>=0&&nx<w&&ny>=0&&ny<h&&isMask[ny*w+nx])border=true;
}
if(border){outR+=src[idx*4];outG+=src[idx*4+1];outB+=src[idx*4+2];outN++}
}
}
}
if(inN>0&&outN>0){
inR/=inN;inG/=inN;inB/=inN;
outR/=outN;outG/=outN;outB/=outN;
const dr=outR-inR,dg=outG-inG,db=outB-inB;
for(let i=0;i<w*h;i++){
if(!isMask[i])continue;
result[i*4]+=dr;result[i*4+1]+=dg;result[i*4+2]+=db;
}
}

// ===== PHASE 6: Boundary feathering (10px) =====
progressText.textContent='边缘融合...';
await new Promise(r=>setTimeout(r,0));

const featherR=10;
for(let y=0;y<h;y++){
for(let x=0;x<w;x++){
const idx=y*w+x;if(!isMask[idx])continue;
let minD=featherR+1;
for(let dy=-featherR;dy<=featherR&&minD>0;dy++){
for(let dx=-featherR;dx<=featherR&&minD>0;dx++){
const nx=x+dx,ny=y+dy;
if(nx>=0&&nx<w&&ny>=0&&ny<h&&!isMask[ny*w+nx])minD=Math.min(minD,Math.sqrt(dx*dx+dy*dy));
}
}
if(minD>featherR)continue;
const t=Math.max(0,Math.min(1,minD/featherR));
const a=t*t*(3-2*t);
let lr=0,lg=0,lb=0,lw=0;
const sR=8;
for(let dy=-sR;dy<=sR;dy++)for(let dx=-sR;dx<=sR;dx++){
const nx=x+dx,ny=y+dy;
if(nx>=0&&nx<w&&ny>=0&&ny<h&&!isMask[ny*w+nx]){
const pi=(ny*w+nx)*4;const wt=1/Math.max(1,Math.sqrt(dx*dx+dy*dy));
lr+=src[pi]*wt;lg+=src[pi+1]*wt;lb+=src[pi+2]*wt;lw+=wt;
}
}
if(lw>0){
lr/=lw;lg/=lw;lb/=lw;
const pi=idx*4;
result[pi]=result[pi]*a+lr*(1-a);
result[pi+1]=result[pi+1]*a+lg*(1-a);
result[pi+2]=result[pi+2]*a+lb*(1-a);
}
}
}

// Write result
const outData=ctx.createImageData(w,h);
for(let i=0;i<w*h*4;i++)outData.data[i]=Math.max(0,Math.min(255,Math.round(result[i])));
ctx.putImageData(outData,0,0);

maskCtx.clearRect(0,0,w,h);
undoStack=[];redoStack=[];btnUndo.disabled=true;btnRedo.disabled=true;btnRemove.disabled=true;
}

// Comparison
btnCompare.addEventListener('click',()=>{
if(!isComparing){
isComparing=true;
canvasBox.classList.remove('active');
comparisonBox.classList.add('active');
compSliderX=0.5;
drawComparison();
btnCompare.textContent='🎨 编辑';
}else{
isComparing=false;
comparisonBox.classList.remove('active');
canvasBox.classList.add('active');
btnCompare.textContent='👁 对比';
}
});

function drawComparison(){
const w=mainCanvas.width,h=mainCanvas.height;
compCanvas.width=w;compCanvas.height=h;
// Draw result on right, original on left
compCtx.drawImage(mainCanvas,0,0);
const origTmp=document.createElement('canvas');
origTmp.width=w;origTmp.height=h;
const oCtx=origTmp.getContext('2d');
oCtx.drawImage(originalImg,0,0,w,h);
const splitX=Math.round(w*compSliderX);
compCtx.save();
compCtx.beginPath();compCtx.rect(splitX,0,w-splitX,h);compCtx.clip();
compCtx.drawImage(origTmp,0,0);
compCtx.restore();
// Draw labels
compCtx.font='bold 14px sans-serif';
compCtx.fillStyle='rgba(0,0,0,0.6)';
compCtx.fillRect(10,h-36,50,26);compCtx.fillRect(w-60,h-36,50,26);
compCtx.fillStyle='#fff';
compCtx.fillText('修复后',16,h-16);compCtx.fillText('原图',w-54,h-16);
// Slider
sliderLine.style.left=(compSliderX*100)+'%';
sliderHandle.style.left=(compSliderX*100)+'%';
}

let sliding=false;
sliderHandle.addEventListener('mousedown',e=>{sliding=true;e.preventDefault()});
sliderLine.addEventListener('mousedown',e=>{sliding=true;e.preventDefault()});
document.addEventListener('mousemove',e=>{
if(!sliding)return;
const rect=compCanvas.getBoundingClientRect();
compSliderX=Math.max(0.05,Math.min(0.95,(e.clientX-rect.left)/rect.width));
drawComparison();
});
document.addEventListener('mouseup',()=>sliding=false);

// Download
btnDownload.addEventListener('click',()=>{
// Render at full resolution
const fullW=originalImg.width,fullH=originalImg.height;
const fullCanvas=document.createElement('canvas');
fullCanvas.width=fullW;fullCanvas.height=fullH;
const fCtx=fullCanvas.getContext('2d');
fCtx.drawImage(mainCanvas,0,0,fullW,fullH);
const link=document.createElement('a');
link.download='magic-eraser-result.png';
link.href=fullCanvas.toDataURL('image/png');
link.click();
showToast('下载成功！');
});

// Toast
function showToast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}
</script>
