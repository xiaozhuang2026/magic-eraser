<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f0f1a;--card:#1a1a2e;--accent:#7c3aed;--accent2:#3b82f6;--text:#e2e8f0;--border:#2d2d44;--hover:#252542}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.header{text-align:center;padding:30px 20px 10px;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);border-bottom:1px solid var(--border)}
.header h1{font-size:28px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
.header p{color:#94a3b8;font-size:14px}
.app{max-width:1200px;margin:0 auto;padding:20px}
.toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;padding:12px 16px;background:var(--card);border-radius:12px;margin-bottom:16px;border:1px solid var(--border)}
.toolbar .sep{width:1px;height:28px;background:var(--border)}
.btn{padding:8px 18px;border-radius:8px;border:none;cursor:pointer;font-size:14px;font-weight:500;transition:all .2s;display:flex;align-items:center;gap:6px}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.btn-primary:hover{opacity:.85;transform:translateY(-1px)}
.btn-secondary{background:var(--hover);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{background:#2f2f50}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn.active{box-shadow:0 0 0 2px var(--accent)}
.brush-control{display:flex;align-items:center;gap:8px;font-size:13px;color:#94a3b8}
.brush-control input[type=range]{width:100px;accent-color:var(--accent)}
.brush-control span{min-width:30px}
.upload-area{border:2px dashed var(--border);border-radius:16px;padding:60px 20px;text-align:center;cursor:pointer;transition:all .3s;background:var(--card)}
.upload-area:hover,.upload-area.dragover{border-color:var(--accent);background:#1e1e38}
.upload-area svg{width:64px;height:64px;margin-bottom:16px;opacity:.5}
.upload-area h2{font-size:20px;margin-bottom:8px}
.upload-area p{color:#94a3b8;font-size:14px}
.canvas-container{position:relative;display:none;background:var(--card);border-radius:12px;overflow:hidden;border:1px solid var(--border)}
.canvas-container.active{display:block}
.canvas-wrapper{position:relative;overflow:auto;max-height:65vh;display:flex;justify-content:center;align-items:center;background:#0a0a15}
#displayCanvas{cursor:crosshair;display:block;max-width:100%}
.comparison-container{position:relative;display:none;overflow:hidden;border-radius:12px;border:1px solid var(--border)}
.comparison-container.active{display:block}
.comparison-container canvas{display:block}
.slider-line{position:absolute;top:0;bottom:0;width:3px;background:#fff;cursor:ew-resize;z-index:10}
.slider-handle{position:absolute;top:50%;transform:translate(-50%,-50%);width:36px;height:36px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.4);z-index:11;cursor:ew-resize}
.slider-handle::after{content:'⟷';font-size:16px;color:#333}
.progress-overlay{display:none;position:absolute;inset:0;background:rgba(15,15,26,.85);z-index:20;flex-direction:column;align-items:center;justify-content:center;border-radius:12px}
.progress-overlay.active{display:flex}
.spinner{width:48px;height:48px;border:4px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;margin-bottom:16px}
@keyframes spin{to{transform:rotate(360deg)}}
.progress-text{font-size:15px;color:#94a3b8}
.status-bar{text-align:center;padding:8px;font-size:12px;color:#64748b}
.features{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-top:24px}
.feature{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;text-align:center}
.feature .icon{font-size:32px;margin-bottom:10px}
.feature h3{font-size:15px;margin-bottom:6px}
.feature p{font-size:12px;color:#94a3b8}
.toast{position:fixed;top:20px;right:20px;padding:12px 24px;border-radius:8px;background:#22c55e;color:#fff;font-size:14px;z-index:100;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
.hidden{display:none!important}
.loading-banner{display:none;background:linear-gradient(135deg,#7c3aed,#3b82f6);color:#fff;text-align:center;padding:10px;font-size:14px;animation:pulse 1.5s ease-in-out infinite}
.loading-banner.active{display:block}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
</style>

<script>
// Load OpenCV.js
const CV_URL='https://docs.opencv.org/4.9.0/opencv.js';
let cvReady=false;
const loadingBanner=$('loadingBanner');
loadingBanner.classList.add('active');

function loadOpenCV(){
return new Promise((resolve,reject)=>{
if(typeof cv!=='undefined'&&cv.Mat){cvReady=true;loadingBanner.classList.remove('active');resolve();return}
const script=document.createElement('script');
script.setAttribute('async','');
script.setAttribute('type','text/javascript');
script.addEventListener('load',()=>{
cv['onRuntimeInitialized']=()=>{cvReady=true;loadingBanner.classList.remove('active');resolve()};
// Fallback: poll for ready
let tries=0;
const poll=setInterval(()=>{
if(typeof cv!=='undefined'&&cv.Mat){clearInterval(poll);cvReady=true;loadingBanner.classList.remove('active');resolve()}
if(++tries>200){clearInterval(poll);reject(new Error('OpenCV load timeout'))}
},100);
});
script.addEventListener('error',()=>reject(new Error('Failed to load OpenCV')));
script.setAttribute('src',CV_URL);
document.head.appendChild(script);
});
}
loadOpenCV().catch(e=>console.error('OpenCV load error:',e));

const $=id=>document.getElementById(id);
const uploadArea=$('uploadArea'),fileInput=$('fileInput');
const editorSection=$('editorSection'),featureSection=$('featureSection');
const displayCanvas=$('displayCanvas'),dCtx=displayCanvas.getContext('2d');
const compCanvas=$('compCanvas'),compCtx=compCanvas.getContext('2d');
const canvasBox=$('canvasBox'),comparisonBox=$('comparisonBox');
const brushSizeInput=$('brushSize'),brushSizeVal=$('brushSizeVal');
const inpaintRadiusInput=$('inpaintRadius'),inpaintRadiusVal=$('inpaintRadiusVal');
const btnRemove=$('btnRemove'),btnUndo=$('btnUndo'),btnRedo=$('btnRedo');
const btnCompare=$('btnCompare'),btnDownload=$('btnDownload');
const btnBrush=$('btnBrush'),btnEraser=$('btnEraser');
const progressOverlay=$('progressOverlay'),progressText=$('progressText');
const statusBar=$('statusBar');
const sliderLine=$('sliderLine'),sliderHandle=$('sliderHandle');

let originalImg=null,resultCanvas=null;
let workCanvas,workCtx,maskCanvas,maskCtx;
let painting=false,tool='brush';
let undoStack=[],redoStack=[];
let isComparing=false,compSliderX=0.5;
let displayScale=1;
const MAX_DIM=2048;

fileInput.addEventListener('change',e=>{if(e.target.files[0])loadImage(e.target.files[0])});
uploadArea.addEventListener('dragover',e=>{e.preventDefault();uploadArea.classList.add('dragover')});
uploadArea.addEventListener('dragleave',()=>uploadArea.classList.remove('dragover'));
uploadArea.addEventListener('drop',e=>{e.preventDefault();uploadArea.classList.remove('dragover');if(e.dataTransfer.files[0])loadImage(e.dataTransfer.files[0])});
$('btnUploadNew').addEventListener('click',()=>{
const inp=document.createElement('input');inp.type='file';inp.accept='image/*';
inp.addEventListener('change',e=>{if(e.target.files[0])loadImage(e.target.files[0])});
inp.click();
});

function loadImage(file){
const reader=new FileReader();
reader.onload=e=>{
const img=new Image();
img.onload=()=>{
originalImg=img;resultCanvas=null;
setupCanvas(img);
editorSection.classList.remove('hidden');
uploadArea.style.display='none';featureSection.style.display='none';
btnRemove.disabled=true;btnCompare.disabled=true;btnDownload.disabled=true;
undoStack=[];redoStack=[];btnUndo.disabled=true;btnRedo.disabled=true;
isComparing=false;canvasBox.classList.add('active');comparisonBox.classList.remove('active');
statusBar.textContent='涂抹要去除的水印区域，然后点击「去除水印」';
};img.src=e.target.result;
};reader.readAsDataURL(file);
}

function setupCanvas(img){
let w=img.width,h=img.height;
if(w>MAX_DIM||h>MAX_DIM){const s=MAX_DIM/Math.max(w,h);w=Math.round(w*s);h=Math.round(h*s)}
workCanvas=document.createElement('canvas');workCanvas.width=w;workCanvas.height=h;
workCtx=workCanvas.getContext('2d');workCtx.drawImage(img,0,0,w,h);
maskCanvas=document.createElement('canvas');maskCanvas.width=w;maskCanvas.height=h;
maskCtx=maskCanvas.getContext('2d');maskCtx.clearRect(0,0,w,h);
const maxW=1100,maxH=650;
displayScale=Math.min(maxW/w,maxH/h,1);
displayCanvas.width=Math.round(w*displayScale);displayCanvas.height=Math.round(h*displayScale);
dCtx.drawImage(workCanvas,0,0,displayCanvas.width,displayCanvas.height);
}

function getWorkPos(e){
const rect=displayCanvas.getBoundingClientRect();
const t=e.touches?e.touches[0]:e;
const dx=(t.clientX-rect.left)*(displayCanvas.width/rect.width);
const dy=(t.clientY-rect.top)*(displayCanvas.height/rect.height);
return{x:dx/displayScale,y:dy/displayScale};
}
function startPaint(e){e.preventDefault();painting=true;const p=getWorkPos(e);maskCtx.beginPath();maskCtx.moveTo(p.x,p.y);paintDot(p)}
function movePaint(e){e.preventDefault();if(!painting)return;const p=getWorkPos(e);paintDot(p)}
function endPaint(){if(!painting)return;painting=false;saveUndo();btnRemove.disabled=false}
function paintDot(p){
const r=parseInt(brushSizeInput.value)/2/displayScale;
maskCtx.globalCompositeOperation=tool==='brush'?'source-over':'destination-out';
maskCtx.fillStyle='rgba(255,0,0,0.5)';
maskCtx.beginPath();maskCtx.arc(p.x,p.y,r,0,Math.PI*2);maskCtx.fill();
redrawDisplay();
}
function redrawDisplay(){
dCtx.drawImage(workCanvas,0,0,displayCanvas.width,displayCanvas.height);
if(hasMask()){
const tmp=document.createElement('canvas');tmp.width=workCanvas.width;tmp.height=workCanvas.height;
const tc=tmp.getContext('2d');tc.drawImage(maskCanvas,0,0);
tc.globalCompositeOperation='source-in';tc.fillStyle='rgba(255,60,60,0.35)';tc.fillRect(0,0,tmp.width,tmp.height);
dCtx.drawImage(tmp,0,0,displayCanvas.width,displayCanvas.height);
}
}
function hasMask(){const d=maskCtx.getImageData(0,0,maskCanvas.width,maskCanvas.height).data;for(let i=3;i<d.length;i+=4)if(d[i]>0)return true;return false}

displayCanvas.addEventListener('mousedown',startPaint);
displayCanvas.addEventListener('mousemove',movePaint);
displayCanvas.addEventListener('mouseup',endPaint);
displayCanvas.addEventListener('mouseleave',endPaint);
displayCanvas.addEventListener('touchstart',startPaint,{passive:false});
displayCanvas.addEventListener('touchmove',movePaint,{passive:false});
displayCanvas.addEventListener('touchend',endPaint);

btnBrush.addEventListener('click',()=>{tool='brush';btnBrush.classList.add('active');btnEraser.classList.remove('active')});
btnEraser.addEventListener('click',()=>{tool='eraser';btnEraser.classList.add('active');btnBrush.classList.remove('active')});
brushSizeInput.addEventListener('input',()=>brushSizeVal.textContent=brushSizeInput.value);
inpaintRadiusInput.addEventListener('input',()=>inpaintRadiusVal.textContent=inpaintRadiusInput.value);

function saveUndo(){
const imgData=maskCtx.getImageData(0,0,maskCanvas.width,maskCanvas.height);
undoStack.push(imgData);if(undoStack.length>30)undoStack.shift();
redoStack=[];btnUndo.disabled=false;btnRedo.disabled=true;
}
btnUndo.addEventListener('click',()=>{
if(!undoStack.length)return;
redoStack.push(maskCtx.getImageData(0,0,maskCanvas.width,maskCanvas.height));
maskCtx.putImageData(undoStack.pop(),0,0);redrawDisplay();
btnUndo.disabled=!undoStack.length;btnRedo.disabled=false;btnRemove.disabled=!hasMask();
});
btnRedo.addEventListener('click',()=>{
if(!redoStack.length)return;
undoStack.push(maskCtx.getImageData(0,0,maskCanvas.width,maskCanvas.height));
maskCtx.putImageData(redoStack.pop(),0,0);redrawDisplay();
btnRedo.disabled=!redoStack.length;btnUndo.disabled=false;btnRemove.disabled=!hasMask();
});

// ===== INPAINTING with OpenCV =====
btnRemove.addEventListener('click',async()=>{
if(!cvReady){showToast('OpenCV 引擎仍在加载中，请稍候...');return}
progressOverlay.classList.add('active');progressText.textContent='正在智能修复中...';
await new Promise(r=>setTimeout(r,50));
try{
await inpaintOCV();
btnCompare.disabled=false;btnDownload.disabled=false;
statusBar.textContent='修复完成！点击「对比」查看效果，或「下载」保存结果';
showToast('修复完成！');
}catch(e){showToast('修复失败: '+e.message);console.error(e)}
progressOverlay.classList.remove('active');
});

async function inpaintOCV(){
const w=workCanvas.width,h=workCanvas.height;
const radius=parseInt(inpaintRadiusInput.value);

// Get source image as OpenCV Mat
const srcImageData=workCtx.getImageData(0,0,w,h);
const srcMat=cv.matFromImageData(srcImageData);

// Get mask - convert to grayscale single channel
const maskImageData=maskCtx.getImageData(0,0,w,h);
const maskRGBA=cv.matFromImageData(maskImageData);
const maskGray=new cv.Mat();
cv.cvtColor(maskRGBA,maskGray,cv.COLOR_RGBA2GRAY);
maskRGBA.delete();

// Threshold mask to binary
cv.threshold(maskGray,maskGray,30,255,cv.THRESH_BINARY);

// Dilate mask slightly for better edge coverage
const kernel=cv.getStructuringElement(cv.MORPH_ELLIPSE,new cv.Size(3,3));
cv.dilate(maskGray,maskGray,kernel);
kernel.delete();

// Run inpaint - TELEA algorithm (Fast Marching Method)
progressText.textContent='Telea算法修复中...';
await new Promise(r=>setTimeout(r,0));
const dst1=new cv.Mat();
cv.inpaint(srcMat,maskGray,dst1,radius,cv.INPAINT_TELEA);

// Run inpaint - NS algorithm (Navier-Stokes)
progressText.textContent='Navier-Stokes算法修复中...';
await new Promise(r=>setTimeout(r,0));
const dst2=new cv.Mat();
cv.inpaint(srcMat,maskGray,dst2,radius,cv.INPAINT_NS);

// Blend both results for best quality
progressText.textContent='融合结果...';
await new Promise(r=>setTimeout(r,0));

// Read both results into ImageData
const tmpCanvas1=document.createElement('canvas');tmpCanvas1.width=w;tmpCanvas1.height=h;
const tmpCtx1=tmpCanvas1.getContext('2d');
tmpCtx1.drawImage(cv.matToImageData ? null : null); // just to use cv
const imgData1=new ImageData(w,h);
const imgData2=new ImageData(w,h);
const d1=dst1.data,d2=dst2.data;
// dst1/dst2 are BGRA, convert to RGBA for ImageData
for(let i=0;i<w*h;i++){
const j=i*4;
imgData1.data[j]=d1[j+2];imgData1.data[j+1]=d1[j+1];imgData1.data[j+2]=d1[j];imgData1.data[j+3]=255;
imgData2.data[j]=d2[j+2];imgData2.data[j+1]=d2[j+1];imgData2.data[j+2]=d2[j];imgData2.data[j+3]=255;
}

// Blend: average of Telea + NS in mask region only
const maskData=maskGray.data;
const srcPixels=srcImageData.data;
const finalData=new ImageData(w,h);
for(let i=0;i<w*h;i++){
const j=i*4;
if(maskData[i]>0){
// In mask: blend both algorithms
finalData.data[j]=Math.round((imgData1.data[j]+imgData2.data[j])/2);
finalData.data[j+1]=Math.round((imgData1.data[j+1]+imgData2.data[j+1])/2);
finalData.data[j+2]=Math.round((imgData1.data[j+2]+imgData2.data[j+2])/2);
finalData.data[j+3]=255;
}else{
// Keep original
finalData.data[j]=srcPixels[j];
finalData.data[j+1]=srcPixels[j+1];
finalData.data[j+2]=srcPixels[j+2];
finalData.data[j+3]=srcPixels[j+3];
}
}

// Apply multi-pass refinement: run inpaint again on the blended result
// This second pass refines the boundary transitions
progressText.textContent='二次精修...';
await new Promise(r=>setTimeout(r,0));

// Create refined source mat from blended result
const refinedMat=cv.matFromImageData(finalData);
const dst3=new cv.Mat();
cv.inpaint(refinedMat,maskGray,dst3,radius,cv.INPAINT_TELEA);
refinedMat.delete();

// Extract refined result
const finalRefined=new ImageData(w,h);
const d3=dst3.data;
for(let i=0;i<w*h;i++){
const j=i*4;
if(maskData[i]>0){
finalRefined.data[j]=d3[j+2];finalRefined.data[j+1]=d3[j+1];finalRefined.data[j+2]=d3[j];finalRefined.data[j+3]=255;
}else{
finalRefined.data[j]=srcPixels[j];finalRefined.data[j+1]=srcPixels[j+1];finalRefined.data[j+2]=srcPixels[j+2];finalRefined.data[j+3]=srcPixels[j+3];
}
}

// Write to work canvas
workCtx.putImageData(finalRefined,0,0);

// Store result
resultCanvas=document.createElement('canvas');resultCanvas.width=w;resultCanvas.height=h;
resultCanvas.getContext('2d').putImageData(finalRefined,0,0);

// Update display
dCtx.drawImage(workCanvas,0,0,displayCanvas.width,displayCanvas.height);

// Cleanup OpenCV mats
srcMat.delete();maskGray.delete();dst1.delete();dst2.delete();dst3.delete();
maskCtx.clearRect(0,0,w,h);
undoStack=[];redoStack=[];btnUndo.disabled=true;btnRedo.disabled=true;btnRemove.disabled=true;
}

// Comparison
btnCompare.addEventListener('click',()=>{
if(!isComparing){
isComparing=true;
canvasBox.classList.remove('active');comparisonBox.classList.add('active');
compSliderX=0.5;drawComparison();btnCompare.textContent='编辑';
}else{
isComparing=false;
comparisonBox.classList.remove('active');canvasBox.classList.add('active');
btnCompare.textContent='对比';
}
});

function drawComparison(){
const w=workCanvas.width,h=workCanvas.height;
compCanvas.width=displayCanvas.width;compCanvas.height=displayCanvas.height;
compCtx.drawImage(resultCanvas,0,0,compCanvas.width,compCanvas.height);
const origTmp=document.createElement('canvas');origTmp.width=w;origTmp.height=h;
origTmp.getContext('2d').drawImage(originalImg,0,0,w,h);
const splitX=Math.round(compCanvas.width*compSliderX);
compCtx.save();compCtx.beginPath();compCtx.rect(splitX,0,compCanvas.width-splitX,compCanvas.height);compCtx.clip();
compCtx.drawImage(origTmp,0,0,compCanvas.width,compCanvas.height);compCtx.restore();
compCtx.font='bold 14px sans-serif';
compCtx.fillStyle='rgba(0,0,0,0.6)';compCtx.fillRect(10,compCanvas.height-36,50,26);compCtx.fillRect(compCanvas.width-60,compCanvas.height-36,50,26);
compCtx.fillStyle='#fff';compCtx.fillText('修复后',16,compCanvas.height-16);compCtx.fillText('原图',compCanvas.width-54,compCanvas.height-16);
sliderLine.style.left=(compSliderX*100)+'%';sliderHandle.style.left=(compSliderX*100)+'%';
}

let sliding=false;
sliderHandle.addEventListener('mousedown',e=>{sliding=true;e.preventDefault()});
sliderLine.addEventListener('mousedown',e=>{sliding=true;e.preventDefault()});
document.addEventListener('mousemove',e=>{
if(!sliding)return;
const rect=compCanvas.getBoundingClientRect();
compSliderX=Math.max(0.05,Math.min(0.95,(e.clientX-rect.left)/rect.width));drawComparison();
});
document.addEventListener('mouseup',()=>sliding=false);

btnDownload.addEventListener('click',()=>{
const link=document.createElement('a');
link.download='magic-eraser-result.png';
link.href=resultCanvas?resultCanvas.toDataURL('image/png'):workCanvas.toDataURL('image/png');
link.click();showToast('下载成功！');
});

function showToast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}
</script>
</body>
</html>
